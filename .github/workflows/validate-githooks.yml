name: Validate Git Hooks Runner

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync and smoke-test dispatcher
        working-directory: .dotfiles/githooks-runner
        shell: bash
        run: |
          set -euo pipefail
          uv sync --locked
          uv run python -m dotfiles_githooks pre-commit
          DOTFILES_GITHOOKS_VERBOSE=1 uv run python -m dotfiles_githooks commit-msg "$RUNNER_TEMP/msg.txt" 2>&1 \
            | tee "$RUNNER_TEMP/githooks-commit-msg.log" >/dev/null
          grep -q '\[dotfiles_githooks\] commit-msg' "$RUNNER_TEMP/githooks-commit-msg.log"

      - name: End-to-end — tracked POSIX stub runs runner
        working-directory: .dotfiles/githooks-runner
        shell: bash
        run: |
          set -euo pipefail
          test -f "$GITHUB_WORKSPACE/.dotfiles/.githooks/pre-commit"
          grep -q 'uv run' "$GITHUB_WORKSPACE/.dotfiles/.githooks/pre-commit"
          export DOTFILES_GITHOOKS_VERBOSE=1
          sh "$GITHUB_WORKSPACE/.dotfiles/.githooks/pre-commit" 2>&1 \
            | tee "$RUNNER_TEMP/githooks-pre-commit.log" >/dev/null
          grep -q '\[dotfiles_githooks\] pre-commit' "$RUNNER_TEMP/githooks-pre-commit.log"
