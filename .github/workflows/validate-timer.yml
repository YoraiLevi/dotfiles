name: Validate Timer Scripts

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config --global user.email "ci@github-actions"
          git config --global user.name "CI"

      # ── Linux: expose systemd user session to subsequent steps ────────────
      - name: Export XDG_RUNTIME_DIR
        if: runner.os == 'Linux'
        run: echo "XDG_RUNTIME_DIR=/run/user/$(id -u)" >> "$GITHUB_ENV"

      # ── Synthetic bare repo: local fake remote so push works without creds ─
      - name: Set up synthetic bare dotfiles repo (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          dotfiles() { git --git-dir="$HOME/.dotfiles/" --work-tree="$HOME" "$@"; }

          git clone --bare "$GITHUB_WORKSPACE" "$HOME/.dotfiles"
          git init --bare /tmp/dotfiles-remote.git
          dotfiles remote set-url origin /tmp/dotfiles-remote.git

          dotfiles config status.showUntrackedFiles no

          dotfiles sparse-checkout init --cone
          dotfiles sparse-checkout set .gitignore .dotfiles

          dotfiles add -u .
          if ! dotfiles diff --cached --quiet; then
            dotfiles commit -m "Init dotfiles"
          fi
          dotfiles push -u origin HEAD

      - name: Set up bare dotfiles repo (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          function dotfiles { git --git-dir="$HOME/.dotfiles/" --work-tree="$HOME" @args }

          $ws = $env:GITHUB_WORKSPACE
          git clone --bare "$ws" "$HOME\.dotfiles"
          git init --bare C:\dotfiles-remote.git
          dotfiles remote set-url origin C:\dotfiles-remote.git

          dotfiles config status.showUntrackedFiles no

          dotfiles sparse-checkout init --cone
          dotfiles sparse-checkout set .gitignore .dotfiles

          dotfiles add -u .
          dotfiles diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            dotfiles commit -m "Init dotfiles"
          }
          dotfiles push -u origin HEAD

      # ── Install ──────────────────────────────────────────────────────────
      - name: Install systemd timer
        if: runner.os == 'Linux'
        run: bash .dotfiles/dotfiles-timer.sh install

      - name: Install Task Scheduler task
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh .dotfiles/dotfiles-timer.ps1 install

      # ── Smoke test: scheduler registration ──────────────────────────────
      - name: Verify systemd timer registered
        if: runner.os == 'Linux'
        run: |
          systemctl --user list-timers --all
          systemctl --user is-enabled dotfiles-git-commit.timer

      - name: Verify Task Scheduler task registered
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $task = Get-ScheduledTask -TaskName 'dotfiles-git-commit' -ErrorAction Stop
          Write-Host "Task state: $($task.State)"
          Write-Host "Next run:   $((Get-ScheduledTaskInfo -TaskName 'dotfiles-git-commit').NextRunTime)"

      # ── Validate embedded git add mode (-u default, -A after reinstall) ─────
      - name: "Validate .auto-commit embeds git add -u after install (Linux)"
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          f="$HOME/.dotfiles/.auto-commit.sh"
          test -f "$f"
          line=$(grep -E '^git .* add -[uA]' "$f" | head -n1)
          [ -n "$line" ] || { echo "FAIL: no git add staging line"; exit 1; }
          echo "Staging line: $line"
          echo "$line" | grep -q 'add -u'
          echo "$line" | grep -q 'add -A' && { echo "FAIL: expected git add -u on staging line"; exit 1; }
          echo "PASS: generated script uses git add -u"

      - name: "Validate .auto-commit.ps1 embeds git add -u after install (Windows)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $f = Join-Path $env:USERPROFILE '.dotfiles\.auto-commit.ps1'
          if (-not (Test-Path $f)) { throw "missing $f" }
          $hits = @(Select-String -Path $f -Pattern '^\s*& git @gitArgs add -(u|A)')
          if ($hits.Count -eq 0) { throw "FAIL: no '& git @gitArgs add -u|-A' line in $f" }
          $line = $hits[0].Line
          Write-Host "Staging line: $line"
          if ($line -notmatch 'add -u\s*$') { throw "FAIL: expected '& git @gitArgs add -u', got: $line" }
          if ($line -match 'add -A') { throw "FAIL: unexpected add -A on staging line" }
          Write-Host "PASS: generated script uses git add -u"

      # ── Unit test: commit fires when a tracked file changes ──────────────
      - name: "Unit test: commit fires on file change (Linux)"
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          dotfiles() { git --git-dir="$HOME/.dotfiles/" --work-tree="$HOME" "$@"; }

          echo "change" >> "$HOME/README.md"
          bash "$HOME/.dotfiles/.auto-commit.sh"
          COUNT=$(dotfiles log --oneline | wc -l)
          [ "$COUNT" -ge 2 ] || { echo "FAIL: expected commit, got $COUNT"; exit 1; }
          MSG=$(dotfiles log -1 --pretty=%s)
          echo "$MSG" | grep -E '^chore\(dotfiles\):' \
            || { echo "FAIL: unexpected message: $MSG"; exit 1; }
          echo "PASS: $MSG"

      - name: "Unit test: commit fires on file change (Windows)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          function dotfiles { git --git-dir="$HOME/.dotfiles/" --work-tree="$HOME" @args }

          "change" | Add-Content "$env:USERPROFILE\README.md"
          & "$env:USERPROFILE\.dotfiles\.auto-commit.ps1"
          $count = (dotfiles log --oneline).Count
          if ($count -lt 2) { throw "FAIL: expected commit, got $count" }
          $msg = dotfiles log -1 --pretty=%s
          if ($msg -notmatch '^\s*chore\(dotfiles\):') { throw "FAIL: unexpected message: $msg" }
          Write-Host "PASS: $msg"

      # ── Unit test: no spurious commit when nothing changed ───────────────
      - name: "Unit test: no commit when nothing changed (Linux)"
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          dotfiles() { git --git-dir="$HOME/.dotfiles/" --work-tree="$HOME" "$@"; }

          BEFORE=$(dotfiles log -1 --pretty=%H)
          bash "$HOME/.dotfiles/.auto-commit.sh"
          AFTER=$(dotfiles log -1 --pretty=%H)
          [ "$BEFORE" = "$AFTER" ] \
            || { echo "FAIL: unexpected commit when nothing changed"; exit 1; }
          echo "PASS: no spurious commit"

      - name: "Unit test: no commit when nothing changed (Windows)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          function dotfiles { git --git-dir="$HOME/.dotfiles/" --work-tree="$HOME" @args }

          $before = dotfiles log -1 --pretty=%H
          & "$env:USERPROFILE\.dotfiles\.auto-commit.ps1"
          $after  = dotfiles log -1 --pretty=%H
          if ($before -ne $after) { throw "FAIL: unexpected commit when nothing changed" }
          Write-Host "PASS: no spurious commit"

      - name: "Reinstall with git add -A (Linux)"
        if: runner.os == 'Linux'
        run: bash .dotfiles/dotfiles-timer.sh reinstall '--all'

      - name: "Reinstall with git add -A (Windows)"
        if: runner.os == 'Windows'
        shell: pwsh
        # Invoke script in this pwsh session with named params — avoids nested `pwsh ... -AddAll` binding to the host.
        # (& must not start the YAML scalar — bare `&` is interpreted as a YAML anchor.)
        run: |
          & (Join-Path $env:GITHUB_WORKSPACE '.dotfiles/dotfiles-timer.ps1') -Action reinstall -AddAll

      - name: "Validate .auto-commit embeds git add -A after reinstall --all (Linux)"
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          f="$HOME/.dotfiles/.auto-commit.sh"
          line=$(grep -E '^git .* add -[uA]' "$f" | head -n1)
          [ -n "$line" ] || { echo "FAIL: no git add staging line"; exit 1; }
          echo "Staging line: $line"
          echo "$line" | grep -q 'add -A'
          echo "$line" | grep -q 'add -u' && { echo "FAIL: expected git add -A on staging line"; exit 1; }
          echo "PASS: generated script uses git add -A"

      - name: "Validate .auto-commit.ps1 embeds git add -A after reinstall -AddAll (Windows)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $f = Join-Path $env:USERPROFILE '.dotfiles\.auto-commit.ps1'
          $hits = @(Select-String -Path $f -Pattern '^\s*& git @gitArgs add -(u|A)')
          if ($hits.Count -eq 0) { throw "FAIL: no '& git @gitArgs add -u|-A' line in $f" }
          $line = $hits[0].Line
          Write-Host "Staging line: $line"
          if ($line -notmatch 'add -A\s*$') { throw "FAIL: expected '& git @gitArgs add -A', got: $line" }
          if ($line -match 'add -u\b') { throw "FAIL: unexpected add -u on staging line" }
          Write-Host "PASS: generated script uses git add -A"

      # ── CI log samples: after reinstall --all (git add -A); ~/.gitignore matches template README ─
      - name: "CI samples: commit message shapes (Linux)"
        if: runner.os == 'Linux'
        run: bash .github/scripts/ci-commit-message-demos.sh

      - name: "CI samples: commit message shapes (Windows)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh .github/scripts/ci-commit-message-demos.ps1
